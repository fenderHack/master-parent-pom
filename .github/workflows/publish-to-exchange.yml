name: Publish to Anypoint Exchange

on:
  push:
    branches: [ "master" ]
    paths:
      - "master-bom/pom.xml"
      - "parent-pom/pom.xml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build only, no publish"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]

jobs:
  publish:
    name: Publish BOM & Parent POM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      # ── master-bom doit être déployé EN PREMIER ─────────────────────────────
      # mvn deploy inclut la phase install → master-bom sera dans le .m2 local
      # pour que parent-pom puisse résoudre son parent sans dépendre d'Exchange.

      - name: Deploy master-bom to Exchange
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn deploy \
            -f master-bom/pom.xml \
            -s settings-ci.xml \
            ${{ github.event.inputs.dry_run == 'true' && '-DskipRemoteStaging' || '' }} \
            --no-transfer-progress

      # ── parent-pom ──────────────────────────────────────────────────────────
      # Résout master-bom depuis le .m2 local (installé à l'étape précédente).

      - name: Deploy parent-pom to Exchange
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn deploy \
            -f parent-pom/pom.xml \
            -s settings-ci.xml \
            ${{ github.event.inputs.dry_run == 'true' && '-DskipRemoteStaging' || '' }} \
            --no-transfer-progress
