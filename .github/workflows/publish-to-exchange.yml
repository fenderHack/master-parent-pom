name: Publish to Anypoint Exchange

on:
  push:
    branches: [ "master" ]
    paths:
      - "master-bom/pom.xml"
      - "parent-pom/pom.xml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build only, no publish"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]

jobs:
  publish:
    name: Publish BOM & Parent POM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      # Exchange v3 n'est pas compatible avec maven-deploy-plugin 3.x (erreur 412).
      # On force la version 2.8.2 via propriété système en plus du pluginManagement.
      - name: Deploy master-bom to Exchange
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn deploy \
            -f master-bom/pom.xml \
            -s settings-ci.xml \
            -Dmaven.deploy.plugin.version=2.8.2 \
            --no-transfer-progress

      - name: Install master-bom locally (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn install \
            -f master-bom/pom.xml \
            -s settings-ci.xml \
            --no-transfer-progress

      # master-bom est dans le .m2 local après l'étape précédente.
      - name: Deploy parent-pom to Exchange
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn deploy \
            -f parent-pom/pom.xml \
            -s settings-ci.xml \
            -Dmaven.deploy.plugin.version=2.8.2 \
            --no-transfer-progress

      - name: Install parent-pom locally (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn install \
            -f parent-pom/pom.xml \
            -s settings-ci.xml \
            --no-transfer-progress
