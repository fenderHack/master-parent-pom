name: Publish to Anypoint Exchange

on:
  push:
    branches: [ "master" ]
    paths:
      - "master-bom/pom.xml"
      - "parent-pom/pom.xml"
  workflow_dispatch:

jobs:
  publish:
    name: Publish BOM & Parent POM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"

      - name: Install master-bom to local .m2
        run: mvn install -f master-bom/pom.xml -s settings-ci.xml -ntp
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}

      - name: Publish master-bom
        run: |
          VERSION=$(mvn help:evaluate -f master-bom/pom.xml \
            -Dexpression=project.version -q -DforceStdout)
          echo "Publishing master-bom v${VERSION} via Maven deploy"

          LOG_FILE=/tmp/master-bom-deploy.log
          if mvn deploy -f master-bom/pom.xml -s settings-ci.xml -ntp >"${LOG_FILE}" 2>&1; then
            cat "${LOG_FILE}"
            echo "master-bom published."
          else
            cat "${LOG_FILE}"
            if grep -Eiq "status code: 409|409 Conflict|already exists|already been deployed" "${LOG_FILE}"; then
              echo "master-bom already published (409) - continuing."
            else
              echo "Echec publication master-bom via Maven deploy"
              exit 1
            fi
          fi
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}

      - name: Publish parent-pom
        run: |
          VERSION=$(mvn help:evaluate -f parent-pom/pom.xml \
            -Dexpression=project.version -q -DforceStdout)
          echo "Publishing parent-pom v${VERSION} via Maven deploy"

          LOG_FILE=/tmp/parent-pom-deploy.log
          if mvn deploy -f parent-pom/pom.xml -s settings-ci.xml -ntp >"${LOG_FILE}" 2>&1; then
            cat "${LOG_FILE}"
            echo "parent-pom published."
          else
            cat "${LOG_FILE}"
            if grep -Eiq "status code: 409|409 Conflict|already exists|already been deployed" "${LOG_FILE}"; then
              echo "parent-pom already published (409) - continuing."
            else
              echo "Echec publication parent-pom via Maven deploy"
              exit 1
            fi
          fi
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
