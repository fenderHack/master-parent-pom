name: Publish to Anypoint Exchange

# Triggers: push on master (version bump) or manual dispatch
on:
  push:
    branches: [ "master" ]
    paths:
      - "master-bom/pom.xml"
      - "parent-pom/pom.xml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no deploy)"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]

jobs:
  publish:
    name: Publish BOM & Parent POM to Exchange
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 8 (required by mule-maven-plugin) ──────────────────────────
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      # ── 3. Print versions for traceability ────────────────────────────────
      - name: Show artifact versions
        run: |
          echo "master-bom  : $(mvn help:evaluate -f master-bom/pom.xml  -Dexpression=project.version -q -DforceStdout -s settings-ci.xml)"
          echo "parent-pom  : $(mvn help:evaluate -f parent-pom/pom.xml   -Dexpression=project.version -q -DforceStdout -s settings-ci.xml)"
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}

      # ── 4. Deploy master-bom ───────────────────────────────────────────────
      # Must run before parent-pom so it is available in the local .m2 cache.
      - name: Deploy master-bom to Exchange
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn deploy \
            -f master-bom/pom.xml \
            -s settings-ci.xml \
            --no-transfer-progress

      - name: Build master-bom (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn install \
            -f master-bom/pom.xml \
            -s settings-ci.xml \
            --no-transfer-progress

      # ── 5. Deploy parent-pom ───────────────────────────────────────────────
      # master-bom is already in the local .m2 from the previous step.
      - name: Deploy parent-pom to Exchange
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn deploy \
            -f parent-pom/pom.xml \
            -s settings-ci.xml \
            --no-transfer-progress

      - name: Build parent-pom (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          ANYPOINT_CLIENT_ID:     ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn install \
            -f parent-pom/pom.xml \
            -s settings-ci.xml \
            --no-transfer-progress
